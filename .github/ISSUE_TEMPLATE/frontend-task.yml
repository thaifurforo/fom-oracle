name: "Task de Frontend"
description: "Template para tasks de frontend com aderência obrigatória ao DESIGN.md"
title: "T-XX — "
labels:
  - task
body:
  - type: markdown
    attributes:
      value: |
        Use este template para qualquer task com impacto em UI/UX ou arquitetura de interface.
        O `DESIGN.md` é guia normativo obrigatório após validação humana.
        Concept art deve permanecer em `.catalog/assets/concept-art/` e não pode ser usada como asset de runtime, UI ou bundle.

  - type: input
    id: parent
    attributes:
      label: "Parent (US/Issue)"
      description: "Informe a issue pai (ex.: #5)"
      placeholder: "#5"
    validations:
      required: true

  - type: textarea
    id: descricao
    attributes:
      label: Descrição
      description: Descreva o objetivo da task de frontend.
    validations:
      required: true

  - type: textarea
    id: done_when
    attributes:
      label: Done when
      description: Defina critérios observáveis de conclusão.
    validations:
      required: true

  - type: textarea
    id: gate
    attributes:
      label: Gate
      description: Comandos/testes de validação obrigatórios.
      placeholder: "pnpm --dir frontend test -- --runInBand <suite>"
    validations:
      required: true

  - type: dropdown
    id: impacto_design
    attributes:
      label: Impacto no DESIGN.md
      options:
        - "Sem impacto (somente aplicação do guia)"
        - "Com impacto (exige proposta de alteração no DESIGN.md e nova validação humana)"
    validations:
      required: true

  - type: textarea
    id: validacao_design
    attributes:
      label: Proposta e validação do DESIGN.md
      description: Se houver impacto no guia, informe o link da proposta e da validação humana explícita. Se não houver impacto, escreva "Não se aplica".
      placeholder: "Não se aplica"
    validations:
      required: true

  - type: textarea
    id: aderencia_design
    attributes:
      label: Aderência ao DESIGN.md
      description: Explique como a task seguirá o guia de decisões de UI/UX e arquitetura de interface.
    validations:
      required: true

  - type: textarea
    id: evidencia_visual
    attributes:
      label: Evidência visual esperada
      description: Descreva quais prints ou fluxo gravado curto devem comprovar a mudança. Se não houver impacto visual, justifique.
    validations:
      required: true

  - type: checkboxes
    id: assets_concept
    attributes:
      label: Uso de concept art
      options:
        - label: Confirmo que concept art não será usada como asset de runtime, UI ou bundle.
          required: true
