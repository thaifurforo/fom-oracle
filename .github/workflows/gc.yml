name: Garbage Collection

on:
  schedule:
    - cron: 0 6 * * 0

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Scan for TODO and FIXME comments
        id: scan-todos
        shell: pwsh
        run: |
          $results = @()
          $trackedFiles = git ls-files |
            Where-Object { $_ -match '\.(cs|ts|tsx|ps1|md|json|ya?ml)$' }

          $trackedFiles |
            Select-String -Pattern 'TODO|FIXME|HACK|XXX' |
            ForEach-Object {
              $relativePath = $_.Path.Replace('\', '/')
              $results += "  - ${relativePath}:$($_.LineNumber) `"$($_.Line.Trim())`""
            }

          if ($results.Count -gt 0) {
            $body = @"
## Garbage Collection Scan - $(Get-Date -Format 'yyyy-MM-dd')

Itens encontrados marcados com TODO/FIXME/HACK/XXX:

$($results -join "`n")

---
*Gerado automaticamente pelo workflow GC semanal.*
"@
            $body | Out-File -FilePath $env:RUNNER_TEMP/gc-body.md -Encoding utf8
            "$($results.Count) itens encontrados" | Out-File -FilePath $env:RUNNER_TEMP/gc-count.txt
          } else {
            "0" | Out-File -FilePath $env:RUNNER_TEMP/gc-count.txt
          }

      - name: Create cleanup issue
        shell: pwsh
        run: |
          $count = Get-Content $env:RUNNER_TEMP/gc-count.txt
          if ($count -ne "0") {
            $title = "GC: limpeza semanal"
            $bodyPath = "$env:RUNNER_TEMP/gc-body.md"
            $existing = gh issue list `
              --state open `
              --search "`"$title`" in:title" `
              --json number,title |
              ConvertFrom-Json |
              Where-Object { $_.title -eq $title } |
              Select-Object -First 1

            if ($existing) {
              gh issue edit $existing.number --body-file $bodyPath
            } else {
              gh issue create --title "$title" --body-file $bodyPath
            }
          } else {
            Write-Host "Nenhum item encontrado. Pulando criacao de issue."
          }
        env:
          GH_TOKEN: ${{ github.token }}
