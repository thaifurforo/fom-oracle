name: Publish Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version to validate or publish
        required: true
        type: choice
        options:
          - v0.1.0
          - v0.2.0
          - v0.3.0
          - v0.4.0
          - v0.5.0
          - v1.0.0
      publish:
        description: Publish the draft release after validation
        required: true
        type: boolean
        default: false
      regenerate_notes:
        description: Regenerate release notes before validation/publish
        required: true
        type: boolean
        default: true

permissions:
  contents: write
  issues: read
  pull-requests: read

jobs:
  publish-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate and optionally publish release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ./scripts/publish-release.ps1 `
            -Version '${{ inputs.version }}' `
            -Publish:('${{ inputs.publish }}' -eq 'true') `
            -RegenerateNotes:('${{ inputs.regenerate_notes }}' -eq 'true') `
            -Repository '${{ github.repository }}' `
            -TargetCommitish 'main' `
            -CurrentRef '${{ github.ref_name }}'
