name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

permissions:
  contents: read
  pull-requests: read

jobs:
  frontend-governance-gate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect frontend/UI changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" > changed_files.txt
          if grep -E '^(frontend/|DESIGN\.md|\.catalog/prototypes/)' changed_files.txt >/dev/null; then
            echo "needs_governance=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_governance=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate frontend DESIGN.md governance
        if: steps.changes.outputs.needs_governance == 'true'
        shell: pwsh
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: ./scripts/validate-frontend-design-governance.ps1

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.9

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Check environment tools
        run: pnpm run check:env

      - name: Install Pester for scaffold tests
        shell: pwsh
        run: Install-Module Pester -Scope CurrentUser -Force -RequiredVersion 5.7.1

      - name: Run T-01 scaffold smoke tests
        shell: pwsh
        run: pnpm run test:t01

      - name: Run frontend design governance tests
        shell: pwsh
        run: pnpm run test:design-governance

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Frontend lint
        run: pnpm --dir frontend run lint

      - name: Frontend typecheck
        run: pnpm --dir frontend run typecheck

      - name: Frontend test
        run: pnpm --dir frontend run test

      - name: Frontend build
        run: pnpm --dir frontend run build:web

      - name: Security audit
        run: pnpm --dir frontend audit --prod
