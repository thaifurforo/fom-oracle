name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.9

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Check environment tools
        run: pnpm run check:env

      - name: Install Pester for scaffold tests
        shell: pwsh
        run: Install-Module Pester -Scope CurrentUser -Force -RequiredVersion 5.7.1

      - name: Run T-01 scaffold smoke tests
        shell: pwsh
        run: pnpm run test:t01

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Frontend lint
        run: pnpm --dir frontend run lint

      - name: Frontend build
        run: pnpm --dir frontend run build

      - name: Security audit
        run: pnpm --dir frontend audit
