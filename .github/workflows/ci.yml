name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0

      - name: Setup pnpm (Corepack)
        run: |
          corepack enable
          corepack prepare pnpm@11.0.9 --activate

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check environment tools
        run: |
          pnpm --version
          dotnet --info

      - name: Install Pester for scaffold tests
        shell: pwsh
        run: Install-Module Pester -Scope CurrentUser -Force -RequiredVersion 5.7.1

      - name: Run T-01 scaffold smoke tests
        shell: pwsh
        run: pnpm run test:t01

      - name: Frontend lint
        run: pnpm --dir frontend run lint

      - name: Frontend typecheck
        run: pnpm --dir frontend run typecheck

      - name: Frontend test
        run: pnpm --dir frontend run test

      - name: Frontend build
        run: pnpm --dir frontend run build:web

      - name: Security audit
        run: pnpm --dir frontend audit --prod
